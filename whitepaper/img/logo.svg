<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560">
  <defs>
    <style>
      .ring { fill: black; }
      .inner { fill: black; }
    </style>
  </defs>

  <g transform="translate(250,245)">

    <!-- ═══ OUTER ROTATING CIRCLE ARROWS ═══ -->
    <!-- Top arc: from ~350° clockwise to ~160°, thick crescent with arrowhead -->
    <path d="
      M 10,-170
      A 170,170 0 1,1 -148,-80
      L -130,-68
      A 148,148 0 1,0 10,-148
      Z
    " fill="black"/>
    <!-- Arrowhead at end of top arc (pointing ~210°) -->
    <polygon points="-148,-80  -120,-108  -106,-66" fill="black"/>

    <!-- Bottom arc: from ~170° clockwise to ~350° -->
    <path d="
      M -10,170
      A 170,170 0 1,1 148,80
      L 130,68
      A 148,148 0 1,0 -10,148
      Z
    " fill="black"/>
    <!-- Arrowhead at end of bottom arc (pointing ~30°) -->
    <polygon points="148,80  120,108  106,66" fill="black"/>

    <!-- ═══ WIFI SIGNAL WAVES (left) ═══ -->
    <path d="M -32,-18 A 36,36 0 0,0 -32,18" stroke="black" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M -52,-34 A 58,58 0 0,0 -52,34" stroke="black" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- ═══ WIFI SIGNAL WAVES (right) ═══ -->
    <path d="M 32,-18 A 36,36 0 0,1 32,18" stroke="black" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 52,-34 A 58,58 0 0,1 52,34" stroke="black" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- ═══ NETWORK NODES (4 arms) ═══ -->
    <!-- Top node -->
    <line x1="0" y1="-18" x2="0" y2="-78" stroke="black" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="-90" r="12" fill="black"/>
    <!-- Bottom-left node -->
    <line x1="-12" y1="10" x2="-60" y2="60" stroke="black" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-70" cy="70" r="12" fill="black"/>
    <!-- Bottom-right node -->
    <line x1="12" y1="10" x2="60" y2="60" stroke="black" stroke-width="8" stroke-linecap="round"/>
    <circle cx="70" cy="70" r="12" fill="black"/>

    <!-- ═══ CENTER HUB (key head) ═══ -->
    <circle cx="0" cy="0" r="20" fill="black"/>

    <!-- Key shaft -->
    <rect x="-7" y="18" width="14" height="54" rx="5" fill="black"/>
    <!-- Key teeth -->
    <rect x="7" y="50" width="13" height="10" rx="3" fill="black"/>
    <rect x="7" y="34" width="10" height="9" rx="3" fill="black"/>

    <!-- ₿ symbol (white, on center hub) -->
    <text x="0" y="8"
      text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="19"
      font-weight="bold"
      fill="white">₿</text>

  </g>

  <!-- ═══ WORDMARK ═══ -->
  <text x="250" y="510"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', Helvetica, sans-serif"
    font-size="78"
    font-weight="900"
    letter-spacing="-2"
    fill="black">opennum</text>

</svg>
